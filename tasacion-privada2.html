    function cargarZonas() {

      /**
 * MOTOR DE VALORACIÓN DE EDIFICACIÓN - JIMÉNEZ & ASOCIADOS
 * Basado en Anexo 2 Resol. 209 (SII 2026)
 * -----------------------------------------------------------------------
 * Esta sección procesa la materialidad y el estado de la construcción
 * para sumarlo al valor del terreno procesado en la Parte 2.
 */

const GPU_2026 = {
    // Valores unitarios por m2 (Pesos CLP) - Tabla 5.4 Tradicionales
    departamento: { // Clase B (Hormigón Armado)
        1: 505761, // Calidad Superior (Lujo)
        2: 373305, // Calidad Media-Superior
        3: 271032, // Calidad Media
        4: 181293, // Calidad Económica
        5: 124310  // Calidad Básica
    },
    casa: { // Clase C (Albañilería / Ladrillo)
        1: 419014, // Calidad Superior
        2: 302194, // Calidad Media-Superior
        3: 201123, // Calidad Media
        4: 114675, // Calidad Económica
        5: 89610   // Calidad Básica
    }
};

// Coeficiente de Depreciación (Tabla 33 del Estudio de Precios 2022)
// Se castiga un 0.8% anual según metodología oficial para Clase B/C.
function calcularDepreciacion(clase, edad) {
    let tasaAnual = 0.008; // 0.8% para concreto/ladrillo
    let depreciacionAcumulada = tasaAnual * edad;
    
    // El SII topa la depreciación en 0.4 (conserva el 40% del valor)
    let factorRetencion = 1 - Math.min(depreciacionAcumulada, 0.60);
    return factorRetencion;
}

/**
 * FUNCIÓN MAESTRA DE CÁLCULO
 * Aquí implementamos tu estrategia: Base 2.0x + Ajustes de Atributos
 */
function calcular() {
    // 1. Obtención de datos de Suelo (VUT extraído en Parte 2)
    const zonaData = document.getElementById('zona').value.split('|');
    if (zonaData.length < 2) return;
    
    const vutFiscal = parseFloat(zonaData[0]); // Valor del suelo por m2 (SII)
    const m2Terreno = parseFloat(document.getElementById('extra').value) || 0;
    
    // 2. Obtención de datos de Edificación
    const tipo = document.getElementById('tipo').value;
    const m2Utiles = parseFloat(document.getElementById('util').value) || 0;
    const calidad = 1; // Por defecto Superior para portal Premium (ajustable)
    
    // 3. Cálculo de Avalúo Fiscal Base (SII puro)
    let avaluoTerrenoFiscal = vutFiscal * m2Terreno;
    let valorUnitarioEdif = GPU_2026[tipo][calidad];
    
    // Aplicamos depreciación (Asumimos 10 años promedio para el simulador)
    let factorVidaUtil = calcularDepreciacion(tipo, 10);
    let avaluoEdifFiscal = (m2Utiles * valorUnitarioEdif) * factorVidaUtil;
    
    let avaluoTotalFiscalPesos = avaluoTerrenoFiscal + avaluoEdifFiscal;
    let avaluoTotalFiscalUF = avaluoTotalFiscalPesos / UF_VALOR;

    // --- ESTRATEGIA JIMÉNEZ: EL MULTIPLICADOR COMERCIAL ---
    // Partimos de un 2.0x fijo (Tu base de mercado)
    let multiplicador = 2.0;

    // 4. PREMIOS POR ATRIBUTOS (Los que llevan el valor a 2.5x o 3x)
    const factorVista = parseFloat(document.getElementById('vista').value); // Ej: 1.30 (Frontal)
    const factorOrienta = parseFloat(document.getElementById('orienta').value); // Ej: 1.08 (N.Poniente)
    const factorEstado = parseFloat(document.getElementById('estado').value); // Ej: 1.10 (Nuevo)
    
    // Los atributos multiplican el valor comercial, no el fiscal
    // Ejemplo: 2.0x * 1.30 (Vista) * 1.08 (Sol) = 2.8x
    let valorComercialUF = avaluoTotalFiscalUF * multiplicador * factorVista * factorOrienta * factorEstado;

    // 5. ACTUALIZACIÓN DE INTERFAZ
    actualizarResultados(avaluoTotalFiscalUF, valorComercialUF);
}

function actualizarResultados(fiscal, comercial) {
    // Efecto Odometer para las UF
    gsap.to(resObj, {
        val: comercial,
        duration: 2,
        ease: "power4.out",
        onUpdate: () => {
            document.getElementById('resUF').innerText = Math.round(resObj.val).toLocaleString('es-CL');
            document.getElementById('fiscalUF').innerText = Math.round(fiscal).toLocaleString('es-CL') + " UF";
        },
        onComplete: () => {
            const elCLP = document.getElementById('resCLP');
            elCLP.innerText = "$ " + Math.round(comercial * UF_VALOR).toLocaleString('es-CL');
            elCLP.style.opacity = 1;
        }
    });
}

/**
 * REFINAMIENTO DEL MOTOR DE CÁLCULO: LA ESCALA JIMÉNEZ
 * El valor parte en 2.0x y escala según atributos.
 */
function calcularEscalamientoComercial(avaluoFiscalUF) {
    // 1. Base fija de mercado (2.0x)
    let multiplicadorBase = 2.0;
    
    // 2. Factores que agregan valor (Premios)
    const factorVista = parseFloat(document.getElementById('vista').value) || 1.0;
    const factorOrienta = parseFloat(document.getElementById('orienta').value) || 1.0;
    const factorEstado = parseFloat(document.getElementById('estado').value) || 1.0;
    
    // 3. Cálculo del multiplicador final dinámico
    // Si la propiedad tiene Vista Mar (+30%), Orientación NP (+8%) y está Nueva (+10%)
    // El multiplicador escala: 2.0 * 1.30 * 1.08 * 1.10 = 3.08x
    let multiplicadorFinal = multiplicadorBase * factorVista * factorOrienta * factorEstado;
    
    // Topamos el multiplicador para mantener coherencia comercial
    multiplicadorFinal = Math.min(multiplicadorFinal, 3.5);

    let valorComercialFinal = avaluoFiscalUF * multiplicadorFinal;
    
    return {
        multiplicador: multiplicadorFinal.toFixed(2),
        valorFinal: valorComercialFinal
    };
}

/**
 * ACTUALIZACIÓN DE INTERFAZ CON FEEDBACK TÉCNICO
 */
function actualizarUIConEscala(fiscalUF, comercialUF, multiplicador) {

    const infoComercial = `Ratio de Mercado: ${multiplicador}x sobre el avalúo fiscal`;

    // Valor en Pesos
    const elCLP = document.getElementById('resCLP');
    const valorCLP = Math.round(comercialUF * UF_VALOR);
    elCLP.innerText = "$ " + valorCLP.toLocaleString('es-CL');

    // Actualizamos el Avalúo Fiscal de referencia
    document.getElementById('fiscalUF').innerText = Math.round(fiscalUF).toLocaleString('es-CL') + " UF";
}

    } else {
        lblUtil.innerText = "Superficie Útil Interior (m²)";
        lblExtra.innerText = "Superficie Terraza / Balcón (m²)";
    }
    calcular();
}

/**
 * GENERACIÓN DE MENSAJE DE CAPTACIÓN (WHATSAPP PREMIUM)
 * Incluye el desglose técnico para que el lead llegue pre-calificado.
 */
function enviarPropuesta() {
    const totalUF = document.getElementById('resUF').innerText;
    const fiscalUF = document.getElementById('fiscalUF').innerText;
    const sector = document.getElementById('zona').options[document.getElementById('zona').selectedIndex]?.text || "No definido";
    const tipo = document.getElementById('tipo').value;
    
    // Calculamos el ratio final para tu información
    const ratio = (parseInt(totalUF.replace(/\./g, '')) / parseInt(fiscalUF.replace(/\./g, ''))).toFixed(2);

    const mensaje = `*EVALUACIÓN PATRIMONIAL - JIMÉNEZ & ASOCIADOS*%0A%0A` +
        `*Activo:* ${tipo.toUpperCase()}%0A` +
        `*Ubicación:* ${sector}%0A` +
        `*Valor Estimado:* ${totalUF} UF%0A` +
        `*Avalúo Fiscal:* ${fiscalUF}%0A` +
        `*Ratio de Mercado:* ${ratio}x%0A%0A` +
        `Solicito validación técnica en terreno para confirmar atributos de Vista, Orientación y Conservación.`;

    window.open(`https://wa.me/56951134778?text=${mensaje}`, '_blank');
}
