<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Partners | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";        
        import { getFirestore, doc, setDoc, serverTimestamp, increment, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
            authDomain: "jimenez-asociados-portal.firebaseapp.com",
            projectId: "jimenez-asociados-portal",
            storageBucket: "jimenez-asociados-portal.firebasestorage.app",
            messagingSenderId: "588021927873",
            appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "sebjmz@gmail.com"; 
        const appId = 'jimenez-portal-oficial'; 

        window.fbReg = { auth, db, createUserWithEmailAndPassword, updateProfile, sendEmailVerification, doc, setDoc, serverTimestamp, increment, updateDoc, ADMIN_EMAIL, appId };    
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050b14; color: white; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/10 via-[#050b14] to-[#050b14]">
    
    <div class="mb-10 text-center">
        <div class="text-3xl font-black tracking-tighter mb-2 cursor-pointer" onclick="window.location.href='index.html'">
            JIMÉNEZ<span class="text-blue-500">&</span>ASOCIADOS
        </div>
        <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold italic">Club de Partners</p>
    </div>

    <div class="glass-panel w-full max-w-md p-10 rounded-[2.5rem] shadow-[0_0_30px_rgba(59,130,246,0.05)]">
        <h1 class="text-3xl font-black mb-8 text-center uppercase italic text-white tracking-tighter">Únete a la <span class="text-blue-500">Red</span></h1>
        
        <form id="reg-form" class="space-y-4">
            <input type="text" id="reg-name" required placeholder="Tu Nombre Completo" class="w-full bg-[#0f172a] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm transition">
            <input type="email" id="reg-email" required placeholder="Tu Correo Electrónico" class="w-full bg-[#0f172a] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm transition">
            <input type="email" id="reg-sponsor" placeholder="Correo de quien te invitó (Opcional)" class="w-full bg-[#0f172a] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm transition placeholder:text-gray-600">
            <input type="password" id="reg-pass" required minlength="6" placeholder="Crea una Contraseña (Min. 6 letras/números)" class="w-full bg-[#0f172a] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm transition">
            
            <button type="submit" id="btn-registrar" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg transition shadow-xl shadow-blue-900/40 uppercase tracking-tighter italic mt-4">
                CREAR MI CUENTA
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">¿Ya eres Partner? <a href="ingresopartner.html" class="text-blue-500 hover:text-white transition">Ingresa aquí</a></p>
        </div>
    </div>

    <script type="module">
        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-registrar');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            let sponsor = document.getElementById('reg-sponsor').value.trim().toLowerCase();

            if (!sponsor) {
                sponsor = window.fbReg.ADMIN_EMAIL.toLowerCase();
            }

            try {
                // 1. Crear usuario
                const userCred = await window.fbReg.createUserWithEmailAndPassword(window.fbReg.auth, email, pass);
                const user = userCred.user; // <-- Aquí definimos "user"

                await window.fbReg.updateProfile(user, { displayName: name });
                
                // 2. Guardar perfil con teléfono "PENDIENTE"
                const profileRef = window.fbReg.doc(window.fbReg.db, 'artifacts', window.fbReg.appId, 'users', user.uid, 'profile', 'data');
                await window.fbReg.setDoc(profileRef, {
                    name: name,
                    email: email,
                    phone: "PENDIENTE", 
                    sponsorEmail: sponsor,
                    createdAt: window.fbReg.serverTimestamp()
                });

                // 3. Enviar correo de verificación
                // NOTA: Usamos "user" que es la variable que creaste arriba
                await window.fbReg.sendEmailVerification(user);                
                
                alert("¡Cuenta creada exitosamente! Hemos enviado un enlace de verificación a tu correo. Debes hacer clic en él antes de poder iniciar sesión.");
                
                // Opcional: Redirigirlo a la pantalla de login para que ingrese cuando verifique
                window.location.href = 'ingresopartner.html';

            } catch (error) {
                console.error(error);
                alert("Error al registrar: " + error.message);
                btn.innerText = "CREAR MI CUENTA";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
