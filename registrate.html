<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Partners | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
  authDomain: "jimenez-asociados-portal.firebaseapp.com",
  projectId: "jimenez-asociados-portal",
  storageBucket: "jimenez-asociados-portal.firebasestorage.app",
  messagingSenderId: "588021927873",
  appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jimenez-intranet-v2';

        window.fb = { auth, db, appId, doc, setDoc, serverTimestamp, createUserWithEmailAndPassword, updateProfile };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --bg: #050505;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-card {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.15);
        }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus {
            border-color: var(--primary) !important;
            outline: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .prefix-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
        }

        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black">

    <div class="mb-8 text-center">
        <div class="text-3xl font-black tracking-tighter mb-2 cursor-pointer" onclick="window.location.href='index.html'">
            JIMÉNEZ<span class="text-blue-500">&</span>ASOCIADOS
        </div>
        <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold">Registro de Nuevo Partner</p>
    </div>

    <div class="glass-panel login-card w-full max-w-lg p-8 md:p-12 rounded-[2.5rem]">
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tighter italic text-center">Crear <span class="text-blue-500">Cuenta</span></h1>
        <p class="text-gray-500 text-sm mb-8 text-center">Completa tus datos para empezar a gestionar tus comisiones</p>
        
        <form id="register-form" class="space-y-5">
            <!-- Nombre -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Nombre Completo</label>
                <input type="text" id="reg-name" required placeholder="Ej: Marcela Soto" class="w-full p-4 rounded-2xl transition mt-1">
            </div>

            <div class="grid md:grid-cols-2 gap-5">
                <!-- RUT con Formato Automático -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">RUT</label>
                    <input type="text" id="reg-rut" required placeholder="12.345.678-9" maxlength="12" class="w-full p-4 rounded-2xl transition mt-1">
                </div>
                <!-- Teléfono con Ayuda Visual -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">WhatsApp</label>
                    <div class="flex mt-1">
                        <span class="prefix-box flex items-center px-4 rounded-l-2xl text-gray-400 font-bold border border-white/10">+56</span>
                        <input type="tel" id="reg-phone" required placeholder="9 1234 5678" maxlength="9" class="w-full p-4 rounded-r-2xl transition border-l-0">
                    </div>
                    <p class="text-[9px] text-blue-400 mt-1 ml-2 italic tracking-tight">* Solo ingresa los 9 dígitos después del +56.</p>
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Correo Electrónico</label>
                <input type="email" id="reg-email" required placeholder="socio@ejemplo.com" class="w-full p-4 rounded-2xl transition mt-1">
            </div>

            <!-- Password -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Contraseña</label>
                <input type="password" id="reg-pass" required placeholder="Crea una clave de acceso" minlength="6" class="w-full p-4 rounded-2xl transition mt-1">
                <p class="text-[9px] text-gray-600 mt-1 ml-2 italic">* Mínimo 6 caracteres para tu seguridad.</p>
            </div>

            <button type="submit" id="reg-button" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg transition transform active:scale-95 shadow-xl shadow-blue-900/40 uppercase italic tracking-wider mt-4">
                FINALIZAR REGISTRO
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500 italic">¿Ya tienes una cuenta activa? <a href="ingresopartner.html" class="text-blue-500 font-bold underline hover:text-blue-400 transition">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script type="module">
        // --- Formateador de RUT Dinámico ---
        document.getElementById('reg-rut').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\./g, '').replace('-', '');
            
            if (value.length > 1) {
                let body = value.slice(0, -1);
                let dv = value.slice(-1).toUpperCase();
                
                // Formatear cuerpo con puntos
                let formattedBody = body.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                
                e.target.value = formattedBody + '-' + dv;
            }
        });

        // --- Lógica de Registro ---
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('reg-button');
            const originalText = btn.innerText;
            btn.classList.add('btn-loading');
            btn.innerText = "CREANDO CUENTA...";

            const name = document.getElementById('reg-name').value;
            const rut = document.getElementById('reg-rut').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                // 1. Crear usuario en Authentication
                const userCredential = await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, pass);
                const user = userCredential.user;

                // 2. Actualizar perfil de usuario (Nombre visible)
                await window.fb.updateProfile(user, { displayName: name });

                // 3. Guardar perfil detallado en Firestore
                // Ruta estructurada: /artifacts/{appId}/users/{userId}/profile/info
                await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'profile', 'info'), {
                    nombre: name,
                    rut: rut,
                    telefono: "+56" + phone.trim().replace(/\s/g, ''),
                    email: email,
                    rol: 'partner_activo',
                    fechaRegistro: window.fb.serverTimestamp(),
                    comisionesPagadas: 0,
                    comisionesPendientes: 0,
                    negociosTotales: 0
                });

                // Guardamos en localStorage para facilitar el primer login
                localStorage.setItem('partner_name', name);

                alert("¡Bienvenido al Club Partners, " + name + "! Tu cuenta ha sido creada exitosamente.");
                window.location.href = 'ingresopartners.html';

            } catch (error) {
                console.error("Error en registro:", error);
                let msg = "Hubo un problema al crear tu cuenta.";
                
                if (error.code === 'auth/email-already-in-use') msg = "Este correo electrónico ya está registrado.";
                if (error.code === 'auth/invalid-email') msg = "El formato del correo no es válido.";
                if (error.code === 'auth/weak-password') msg = "La contraseña es muy débil. Usa al menos 6 caracteres.";
                
                alert(msg);
                btn.classList.remove('btn-loading');
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
