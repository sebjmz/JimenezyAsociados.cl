<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Partners | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jimenez-intranet-v2';

        window.fb = { auth, db, appId, doc, setDoc, serverTimestamp };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --bg: #050505;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-card {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.15);
        }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus {
            border-color: var(--primary) !important;
            outline: none;
        }

        .prefix-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black">

    <div class="mb-8 text-center">
        <div class="text-3xl font-black tracking-tighter mb-2 cursor-pointer" onclick="window.location.href='index.html'">
            JIMÉNEZ<span class="text-blue-500">&</span>ASOCIADOS
        </div>
        <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold">Registro de Nuevo Partner</p>
    </div>

    <div class="glass-panel login-card w-full max-w-lg p-8 md:p-12 rounded-[2.5rem]">
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tighter italic text-center">Crear <span class="text-blue-500">Cuenta</span></h1>
        <p class="text-gray-500 text-sm mb-8 text-center">Completa tus datos para empezar a comisionar</p>
        
        <form id="register-form" class="space-y-5">
            <!-- Nombre -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Nombre Completo</label>
                <input type="text" id="reg-name" required placeholder="Ej: Juan Pérez" class="w-full p-4 rounded-2xl transition mt-1">
            </div>

            <div class="grid md:grid-cols-2 gap-5">
                <!-- RUT -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">RUT</label>
                    <input type="text" id="reg-rut" required placeholder="12.345.678-9" class="w-full p-4 rounded-2xl transition mt-1">
                </div>
                <!-- Teléfono con Ayuda -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Teléfono WhatsApp</label>
                    <div class="flex mt-1">
                        <span class="prefix-box flex items-center px-4 rounded-l-2xl text-gray-400 font-bold">+56</span>
                        <input type="tel" id="reg-phone" required placeholder="9 1234 5678" class="w-full p-4 rounded-r-2xl transition">
                    </div>
                    <p class="text-[9px] text-blue-400 mt-1 ml-2 italic">* No necesitas escribir el +56, ya lo pusimos por ti.</p>
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Correo Electrónico</label>
                <input type="email" id="reg-email" required placeholder="correo@ejemplo.com" class="w-full p-4 rounded-2xl transition mt-1">
            </div>

            <!-- Password -->
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Crea una Contraseña</label>
                <input type="password" id="reg-pass" required placeholder="Mínimo 6 caracteres" class="w-full p-4 rounded-2xl transition mt-1">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg transition transform active:scale-95 shadow-xl shadow-blue-900/40 uppercase italic tracking-wider">
                REGISTRARME AHORA
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500">¿Ya tienes una cuenta? <a href="ingresopartners.html" class="text-blue-500 font-bold underline">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script type="module">
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const name = document.getElementById('reg-name').value;
            const rut = document.getElementById('reg-rut').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                // 1. Crear usuario en Auth
                const userCredential = await window.fb.auth.createUserWithEmailAndPassword(window.fb.auth, email, pass);
                const user = userCredential.user;

                // 2. Guardar perfil extendido en Firestore
                // Ruta: /artifacts/{appId}/users/{userId}/profile/data
                await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'profile', 'info'), {
                    nombre: name,
                    rut: rut,
                    telefono: "+56" + phone.replace(/\s/g, ''),
                    email: email,
                    rol: 'partner',
                    fechaRegistro: window.fb.serverTimestamp(),
                    comisionesPagadas: 0,
                    comisionesPendientes: 0
                });

                alert("¡Registro exitoso! Bienvenido al Club.");
                window.location.href = 'ingresopartners.html';

            } catch (error) {
                console.error(error);
                let msg = "Ocurrió un error al registrar.";
                if (error.code === 'auth/email-already-in-use') msg = "Este correo ya está registrado.";
                if (error.code === 'auth/weak-password') msg = "La contraseña debe tener al menos 6 caracteres.";
                
                alert(msg);
                btn.disabled = false;
                btn.innerText = "REGISTRARME AHORA";
            }
        });

        // Formateador simple de RUT mientras escriben (opcional para ayuda)
        document.getElementById('reg-rut').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\./g, '').replace('-', '');
            if (value.length > 1) {
                let body = value.slice(0, -1);
                let dv = value.slice(-1).toUpperCase();
                e.target.value = body + '-' + dv;
            }
        });
    </script>
</body>
</html>
