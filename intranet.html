<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Intranet | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN OFICIAL
        const firebaseConfig = {
            apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
            authDomain: "jimenez-asociados-portal.firebaseapp.com",
            projectId: "jimenez-asociados-portal",
            storageBucket: "jimenez-asociados-portal.firebasestorage.app",
            messagingSenderId: "588021927873",
            appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'jimenez-portal-oficial';
        const ADMIN_EMAIL = "sebjmz@gmail.com"; 

        window.fb = { auth, db, appId, collection, addDoc, query, onSnapshot, serverTimestamp, doc, signOut, ADMIN_EMAIL };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050b14; color: #ffffff; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none !important; }

        /* Notificación flotante */
        #msg-box {
            position: fixed; bottom: 20px; right: 20px; padding: 1rem 2rem; border-radius: 1rem;
            background: #10b981; color: white; font-weight: bold; display: none;
            z-index: 100; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/10 via-[#050b14] to-[#050b14]">

    <div id="msg-box">¡Dato registrado con éxito!</div>

    <!-- Navbar Superior -->
    <nav class="glass-panel border-b border-white/5 py-4 px-8 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic text-xl shadow-lg shadow-blue-500/20">J</div>
            <span class="font-black text-sm uppercase tracking-widest hidden md:block italic">Gestión Inmobiliaria</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="master-btn" onclick="window.location.href='admin.html'" class="hidden bg-yellow-600/10 text-yellow-500 border border-yellow-500/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-yellow-600 hover:text-white transition-all">
                Panel Master
            </button>

            <div class="h-6 w-[1px] bg-white/10 mx-2 hidden md:block"></div>

            <div class="flex flex-col text-right">
                <span id="partner-display" class="font-bold text-blue-500 text-sm">Cargando...</span>
                <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Socio Activo</span>
            </div>

            <button onclick="handleLogout()" class="bg-red-900/20 text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white transition-colors p-2.5 rounded-xl ml-2">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="p-6 md:p-12 max-w-7xl mx-auto w-full flex-1">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-2">Mis <span class="text-blue-500">Gestiones</span></h1>
                <p class="text-gray-500 text-sm">Estado de tus referidos y comisiones.</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-2xl font-black flex items-center gap-3 transition shadow-[0_0_20px_rgba(59,130,246,0.2)] transform active:scale-95 italic uppercase tracking-widest text-sm">
                <i class="fa-solid fa-plus"></i> NUEVO DATO
            </button>
        </div>

        <!-- Tabla de Datos -->
        <div class="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-[#0f172a] text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] border-b border-white/5">
                        <tr>
                            <th class="px-8 py-6 text-white">Propiedad / Cliente</th>
                            <th class="px-8 py-6 text-white">Progreso</th>
                            <th class="px-8 py-6 text-center text-white">Visto</th>
                            <th class="px-8 py-6 text-center text-white">Firma</th>
                            <th class="px-8 py-6 text-center text-white">Visitas</th>
                            <th class="px-8 py-6 text-right text-white">Bonificación</th>
                        </tr>
                    </thead>
                    <tbody id="leads-body" class="divide-y divide-white/5">
                        <tr><td colspan="6" class="px-8 py-20 text-center text-gray-500 italic">Conectando con la base de datos segura...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Nuevo Dato -->
    <div id="modal-nuevo" class="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6 hidden">
        <div class="glass-panel w-full max-w-xl p-10 rounded-[3rem] relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white text-2xl transition"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-3xl font-black mb-6 uppercase italic tracking-tight text-white">Nueva <span class="text-blue-500">Referencia</span></h3>
            
            <form id="form-add" class="space-y-4">
                <input type="text" id="in-name" required placeholder="Nombre del Cliente" class="w-full bg-[#0f172a] border border-white/10 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm">
                <input type="tel" id="in-phone" required placeholder="WhatsApp del Cliente (+569...)" class="w-full bg-[#0f172a] border border-white/10 p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white font-bold text-sm">
                <select id="in-service" class="w-full bg-[#0f172a] border border-white/10 p-4 rounded-xl focus:outline-none text-white font-bold text-sm">
                    <option value="Venta">Venta de Propiedad</option>
                    <option value="Arriendo">Arriendo</option>
                    <option value="Administración">Administración</option>
                </select>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg transition shadow-xl shadow-blue-900/40 uppercase italic mt-2">
                    REGISTRAR Y NOTIFICAR
                </button>
            </form>
        </div>
    </div>

    <!-- LÓGICA JAVASCRIPT CORREGIDA -->
    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Utilidades UI
        window.showMsg = (text) => {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 3000);
        };
        window.closeModal = () => document.getElementById('modal-nuevo').classList.add('hidden');
        window.openModal = () => document.getElementById('modal-nuevo').classList.remove('hidden');

        // Salida segura
        window.handleLogout = () => {
            window.fb.signOut(window.fb.auth).then(() => {
                window.location.href = 'ingresopartner.html';
            }).catch(e => console.error("Error al salir:", e));
        };

        // 1. Verificación de Autenticación
        onAuthStateChanged(window.fb.auth, (user) => {
            if (!user) {
                window.location.href = 'ingresopartner.html';
            } else {
                // Capturar el nombre (si no tiene, usar el inicio de su correo)
                const partnerName = user.displayName || user.email.split('@')[0];
                document.getElementById('partner-display').innerText = partnerName;
                
                // Mostrar botón master si eres tú
                if (user.email.toLowerCase() === window.fb.ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('master-btn').classList.remove('hidden');
                }
                
                initDashboard(user.uid);
            }
        });

        // 2. Cargar Referidos del Partner (Con Manejo de Errores)
        async function initDashboard(uid) {
            const container = document.getElementById('leads-body');
            
            try {
                const q = window.fb.query(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', uid, 'referidos'));
                
                window.fb.onSnapshot(q, (snapshot) => {
                    let html = "";
                    
                    if (snapshot.empty) {
                        container.innerHTML = '<tr><td colspan="6" class="px-8 py-20 text-center text-gray-500 italic">No tienes referidos activos. ¡Envía tu primer dato!</td></tr>';
                        return;
                    }

                    snapshot.forEach(docSnap => {
                        const item = docSnap.data();
                        
                        // Cálculo de barra de progreso
                        let progress = 10;
                        if(item.contactado) progress += 30;
                        if(item.contrato) progress += 30;
                        if(item.visitas) progress += 20;                        
                        if(item.statusFinal === 'Pago Completado') progress = 100;

                        html += `
                            <tr class="hover:bg-white/5 transition group">
                                <td class="px-8 py-6">
                                    <div class="font-bold text-white text-base">${item.name || 'Sin Nombre'}</div>
                                    <div class="text-[10px] text-gray-500 uppercase font-black tracking-widest">${item.service || 'Venta'}</div>
                                </td>
                                <td class="px-8 py-6 min-w-[150px]">
                                    <div class="flex justify-between items-center mb-1 text-[9px] font-bold text-blue-400">
                                        <span>AVANCE</span>
                                        <span>${progress}%</span>
                                    </div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                                </td>
                                <td class="px-8 py-6 text-center">
                                    <i class="fa-solid ${item.contactado ? 'fa-circle-check text-green-500' : 'fa-clock text-gray-800'} text-xl"></i>
                                </td>
                                <td class="px-8 py-6 text-center">
                                    <i class="fa-solid ${item.contrato ? 'fa-file-signature text-blue-500' : 'fa-file text-gray-900'} text-xl"></i>
                                </td>
                                <td class="px-8 py-6 text-center">
                                    <i class="fa-solid ${item.visitas ? 'fa-users text-purple-500' : 'fa-users text-gray-800'} text-xl"></i>
                                </td>
                                <td class="px-8 py-6 text-right">
                                    ${item.statusFinal === 'Pago Completado' 
                                        ? `<button onclick="window.open('https://wa.me/56951134778')" class="bg-green-600 text-[10px] font-black px-4 py-2 rounded-lg text-white transition hover:bg-green-500 shadow-lg shadow-green-900/30">COBRAR</button>` 
                                        : `<span class="text-[10px] text-gray-500 font-black uppercase italic tracking-widest bg-white/5 px-3 py-1.5 rounded-lg border border-white/5">${item.statusFinal || 'En Proceso'}</span>`}
                                </td>
                            </tr>
                        `;
                    });
                    
                    container.innerHTML = html;
                    
                }, (error) => {
                    // SI HAY ERROR DE REGLAS, LO PINTAMOS AQUÍ EN ROJO
                    console.error("Error en lectura de datos:", error);
                    container.innerHTML = `<tr><td colspan="6" class="px-8 py-20 text-center text-red-500 font-bold italic"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Error: Permiso Denegado. Revisa las reglas de seguridad de Firestore.</td></tr>`;
                });
                
            } catch (err) {
                console.error("Error fatal en initDashboard:", err);
            }
        }

        // 3. Envío de Nuevo Referido
        document.getElementById('form-add').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "ENVIANDO DATOS...";
            btn.disabled = true;

            const user = window.fb.auth.currentUser;
            const name = document.getElementById('in-name').value;
            const phone = document.getElementById('in-phone').value;
            const service = document.getElementById('in-service').value;

            try {
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'referidos'), {
                    name: name, 
                    phone: phone, 
                    service: service,
                    contactado: false,
                    contrato: false,
                    visitas: false,
                    statusFinal: 'Validando Dato',
                    createdAt: window.fb.serverTimestamp()
                });

                closeModal();
                document.getElementById('form-add').reset();
                window.showMsg("Dato registrado con éxito");
            } catch (err) {
                console.error("Error al registrar:", err);
                alert("Error al guardar: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
