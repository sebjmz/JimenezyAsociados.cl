    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
            authDomain: "jimenez-asociados-portal.firebaseapp.com",
            projectId: "jimenez-asociados-portal",
            storageBucket: "jimenez-asociados-portal.firebasestorage.app",
            messagingSenderId: "588021927873",
            appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'jimenez-portal-oficial';
        const ADMIN_EMAIL = "sebjmz@gmail.com"; 

        // ==========================================
        // MOTOR DE LIMPIEZA AUTOMÁTICA
        // ==========================================
        async function ejecutarLimpiezaMaestra(snapshot) {
            let borrados = 0;
            const hoy = new Date();
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const path = docSnap.ref.path;
                if (!path.includes(appId)) continue;
                const fechaCreacion = data.createdAt ? data.createdAt.toDate() : hoy;
                const dias = Math.floor((hoy - fechaCreacion) / (1000 * 60 * 60 * 24));
                let debeBorrarse = false;
                if (!data.contactado && dias >= 7) debeBorrarse = true;
                else if (data.contactado && !data.contrato && dias >= 30) debeBorrarse = true;
                else if (data.contrato && !data.visitas && dias >= 60) debeBorrarse = true;
                else if (data.statusFinal !== 'Oferta' && data.statusFinal !== 'Pagado' && dias >= 90) debeBorrarse = true;
                if (debeBorrarse) {
                    await deleteDoc(docSnap.ref);
                    borrados++;
                }
            }
            if (borrados > 0) {
                const box = document.getElementById('msg-box-admin');
                box.innerText = `LIMPIEZA AUTOMÁTICA: Se eliminaron ${borrados} registros vencidos.`;
                box.style.display = 'block';
                setTimeout(() => box.style.display = 'none', 6000);
            }
        }

        // --- CARGA DE NEGOCIOS ---
        function loadAllLeads() {
            const container = document.getElementById('admin-table-body');
            const containerMobile = document.getElementById('admin-cards-container');
            const q = query(collectionGroup(db, 'referidos'));
            
            onSnapshot(q, (snapshot) => {
                ejecutarLimpiezaMaestra(snapshot);
                let htmlDesktop = "";
                let htmlMobile = "";
                let total = 0, pending = 0, done = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const path = docSnap.ref.path;
                    if (!path.includes(appId)) return;

                    total++;
                    if (!data.contactado) pending++;
                    if (data.statusFinal === 'Pagado') done++;
                    const dias = data.createdAt ? Math.floor((new Date() - data.createdAt.toDate()) / (1000 * 60 * 60 * 24)) : 0;

                 // DISEÑO DESKTOP (TABLA CON WHATSAPP)
                    htmlDesktop += `
                        <tr class="hover:bg-white/5 transition border-b border-white/5">
                            <td class="px-8 py-6">
                                <div class="font-bold text-white text-base">${data.name || 'Sin Nombre'}</div>
                                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${data.service} • Hace ${dias} días</div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <a href="https://wa.me/${data.phone ? data.phone.replace(/\D/g, '') : ''}" target="_blank" class="text-green-500 font-black text-xs hover:underline flex items-center justify-center gap-2">
                                    <i class="fa-brands fa-whatsapp text-lg"></i> ${data.phone || 'S/N'}
                                </a>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'contactado', ${!data.contactado})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.contactado ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-gray-800'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'contrato', ${!data.contrato})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.contrato ? 'fa-file-signature text-blue-500' : 'fa-file text-gray-900'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'visitas', ${!data.visitas})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.visitas ? 'fa-users text-purple-500' : 'fa-users text-gray-800'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <select onchange="window.updateStatus('${path}', 'statusFinal', this.value)" class="bg-[#0f172a] border border-white/10 text-[10px] p-2.5 rounded-xl font-black text-white uppercase cursor-pointer">
                                    <option value="Validando" ${data.statusFinal === 'Validando' ? 'selected' : ''}>VALIDANDO</option>
                                    <option value="Oferta" ${data.statusFinal === 'Oferta' ? 'selected' : ''}>OFERTA</option>
                                    <option value="Pagado" ${data.statusFinal === 'Pagado' ? 'selected' : ''}>PAGADO</option>
                                    <option value="Perdido" ${data.statusFinal === 'Perdido' ? 'selected' : ''}>PERDIDO</option>
                                </select>
                            </td>
                        </tr>`;

                    // DISEÑO MOBILE (TARJETAS) - REEMPLAZADO PARA VER WHATSAPP
                    htmlMobile += `
                        <div class="glass-panel p-6 rounded-3xl mb-4 border-white/5">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <div class="text-lg font-black text-white leading-tight">${data.name || 'Sin Nombre'}</div>
                                    <div class="text-[10px] text-blue-500 font-bold uppercase tracking-widest mt-1">${data.service} • Hace ${dias} d</div>
                                    
                                    <a href="https://wa.me/${data.phone ? data.phone.replace(/\D/g, '') : ''}" target="_blank" class="flex items-center gap-2 text-green-500 font-black text-[11px] mt-3 bg-green-500/10 w-fit px-3 py-1.5 rounded-lg border border-green-500/20">
                                        <i class="fa-brands fa-whatsapp text-sm"></i> ${data.phone || 'S/N'}
                                    </a>
                                </div>
                                <select onchange="window.updateStatus('${path}', 'statusFinal', this.value)" class="bg-blue-600/10 border border-blue-500/20 text-[9px] p-2 rounded-lg font-black text-blue-400 uppercase">
                                    <option value="Validando" ${data.statusFinal === 'Validando' ? 'selected' : ''}>VALIDANDO</option>
                                    <option value="Oferta" ${data.statusFinal === 'Oferta' ? 'selected' : ''}>OFERTA</option>
                                    <option value="Pagado" ${data.statusFinal === 'Pagado' ? 'selected' : ''}>PAGADO</option>
                                    <option value="Perdido" ${data.statusFinal === 'Perdido' ? 'selected' : ''}>PERDIDO</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-3 gap-2 pt-4 border-t border-white/5">
                                <button onclick="window.updateStatus('${path}', 'contactado', ${!data.contactado})" class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white/5">
                                    <i class="fa-solid ${data.contactado ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-gray-800'} text-xl"></i>
                                    <span class="text-[8px] font-bold text-gray-500 uppercase">Contactado</span>
                                </button>
                                <button onclick="window.updateStatus('${path}', 'contrato', ${!data.contrato})" class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white/5">
                                    <i class="fa-solid ${data.contrato ? 'fa-file-signature text-blue-500' : 'fa-file text-gray-800'} text-xl"></i>
                                    <span class="text-[8px] font-bold text-gray-500 uppercase">Firma</span>
                                </button>
                                <button onclick="window.updateStatus('${path}', 'visitas', ${!data.visitas})" class="flex flex-col items-center gap-1 p-2 rounded-xl bg-white/5">
                                    <i class="fa-solid ${data.visitas ? 'fa-users text-purple-500' : 'fa-users text-gray-800'} text-xl"></i>
                                    <span class="text-[8px] font-bold text-gray-500 uppercase">Visitas</span>
                                </button>
                            </div>
                        </div>`;
                });

                container.innerHTML = htmlDesktop || '<tr><td colspan="5" class="p-20 text-center text-gray-600 italic">No hay datos activos.</td></tr>';
                containerMobile.innerHTML = htmlMobile || '<div class="p-10 text-center text-gray-600 italic">No hay datos activos.</div>';
                
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-pending').innerText = pending;
                document.getElementById('stat-done').innerText = done;
            });
        }

        // ==========================================
        // BOT 2: LIMPIEZA DE PARTNERS INACTIVOS
        // ==========================================
        async function limpiarPartnersInactivos(snapshot) {
            const hoy = new Date();
            let eliminados = 0;

            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                if (!docSnap.ref.path.includes(appId)) continue;

                // Si nunca ha firmado, usamos su fecha de creación
                const baseFecha = data.lastSuccessAt ? data.lastSuccessAt.toDate() : (data.createdAt ? data.createdAt.toDate() : hoy);
                const diasInactivo = Math.floor((hoy - baseFecha) / (1000 * 60 * 60 * 24));

                // REGLA DE ORO: 30 días sin firmas = Se elimina el perfil del socio
                if (diasInactivo >= 30) {
                    await deleteDoc(docSnap.ref);
                    eliminados++;
                }
            }

            if (eliminados > 0) {
                const box = document.getElementById('msg-box-admin');
                box.innerText = `LIMPIEZA: Se eliminaron ${eliminados} socios inactivos (30 días sin firmas).`;
                box.style.display = 'block';
                setTimeout(() => box.style.display = 'none', 5000);
            }

                    // Si no tiene firmas, se elimina SU PERFIL, pero NO sus referidos
                    if (!tieneFirmados) {
                        await deleteDoc(docSnap.ref); 
                        
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'estadisticas'), { totalSocios: increment(-1) });
                        } catch (e) {}
                        
                        partnersBorrados++;
                    }
                }
            }

            if (partnersBorrados > 0) {
                const box = document.getElementById('msg-box-admin');
                box.innerText = `LIMPIEZA DE PARTNERS: Se eliminó ${partnersBorrados} socio inactivo. Sus referidos siguen en el sistema.`;
                box.style.display = 'block';
                setTimeout(() => box.style.display = 'none', 6000);
            }
        }

        // --- CARGA DE PARTNERS ---
        function loadAllPartners() {
            const container = document.getElementById('admin-partners-body');
            const containerMobile = document.getElementById('admin-partners-cards');
            const q = query(collectionGroup(db, 'profile'));
            onSnapshot(q, (snapshot) => {
                
                limpiarPartnersInactivos(snapshot); // <-- EL BOT SE ACTIVA AQUÍ AUTOMÁTICAMENTE

                let htmlDesktop = "";
                let htmlMobile = "";
                let count = 0, nuevos = 0;
                let sponsors = new Set();
                const hoy = new Date();

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const path = docSnap.ref.path;
                    if (!path.includes(appId)) return;
                    
                    count++;
                    if (data.sponsorEmail) sponsors.add(data.sponsorEmail);
                    const fechaCreacion = data.createdAt ? data.createdAt.toDate() : hoy;
                    const dias = Math.floor((hoy - fechaCreacion) / (1000 * 60 * 60 * 24));
                    if (dias <= 30) nuevos++;
                    let fechaStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "---";

                    htmlDesktop += `
                        <tr class="hover:bg-white/5 transition border-b border-white/5">
                            <td class="px-8 py-6">
                                <div class="font-bold text-white text-base">${data.name || 'Socio'}</div>
                                <div class="text-[10px] text-gray-500 font-bold">${data.email}</div>
                            </td>
                            <td class="px-8 py-6 text-center text-xs text-purple-400 font-bold">${data.sponsorEmail || 'Admin'}</td>
                            <td class="px-8 py-6 text-center text-xs text-gray-400 font-bold">${fechaStr}</td>
                            <td class="px-8 py-6 text-right">
                                <button onclick="window.deletePartner('${path}')" class="bg-red-900/10 text-red-500 px-4 py-2 rounded-lg text-[10px] font-black uppercase border border-red-500/10 hover:bg-red-600 hover:text-white transition">Eliminar</button>
                            </td>
                        </tr>`;

                    htmlMobile += `
                        <div class="glass-panel p-5 rounded-2xl mb-3 border-white/5 flex justify-between items-center">
                            <div>
                                <div class="font-black text-white text-sm">${data.name || 'Socio'}</div>
                                <div class="text-[9px] text-gray-500 font-bold mt-0.5">${data.email}</div>
                                <div class="text-[9px] text-purple-400 font-black uppercase mt-1">Sponsor: ${data.sponsorEmail || 'Admin'}</div>
                            </div>
                            <button onclick="window.deletePartner('${path}')" class="bg-red-900/20 text-red-500 p-3 rounded-xl text-xs"><i class="fa-solid fa-trash-can"></i></button>
                        </div>`;
                });
                
                container.innerHTML = htmlDesktop;
                containerMobile.innerHTML = htmlMobile;
                document.getElementById('stat-partners-total').innerText = count;
                document.getElementById('stat-partners-nuevos').innerText = nuevos;
                document.getElementById('stat-partners-sponsors').innerText = sponsors.size;
            });
        }

        window.updateStatus = async (path, field, value) => {
            try { 
                // Actualizamos el dato del referido
                await updateDoc(doc(db, path), { [field]: value }); 
                
                // SI MARCAs FIRMA (contrato) COMO EXITOSA, RESETEAMOS LOS 30 DÍAS
                if (field === 'contrato' && value === true) {
                    const pathParts = path.split('/');
                    const partnerUid = pathParts[3]; // El ID del socio está en la posición 3 de la ruta
                    
                    const profileRef = doc(db, 'artifacts', appId, 'users', partnerUid, 'profile', 'data');
                    
                    await updateDoc(profileRef, { 
                        lastSuccessAt: serverTimestamp() // Le damos 30 días de vida desde ahora
                    });
                    
                    const box = document.getElementById('msg-box-admin');
                    box.innerText = "¡FIRMA CONFIRMADA! Reloj del socio reiniciado a 30 días.";
                    box.style.display = 'block';
                    setTimeout(() => box.style.display = 'none', 4000);
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        window.deletePartner = async (path) => {
            if (confirm("¿Eliminar socio?")) {
                try { 
                    await deleteDoc(doc(db, path)); 
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'estadisticas'), { totalSocios: increment(-1) });
                } catch (e) { alert("Error: " + e.message); }
            }
        };

        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = 'ingresopartner.html';
            }).catch((error) => alert("Error al salir: " + error.message));
        };

        window.switchTab = (tab) => {
            document.getElementById('view-negocios').classList.toggle('hidden', tab !== 'negocios');
            document.getElementById('view-partners').classList.toggle('hidden', tab !== 'partners');
            
            const btnNeg = document.getElementById('btn-tab-negocios');
            const btnPart = document.getElementById('btn-tab-partners');
            
            if (tab === 'negocios') {
                btnNeg.className = "bg-blue-600 text-white px-5 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition shadow-lg";
                btnPart.className = "text-gray-400 hover:text-white px-5 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition";
            } else {
                btnNeg.className = "text-gray-400 hover:text-white px-5 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition";
                btnPart.className = "bg-purple-600 text-white px-5 md:px-6 py-2 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-widest transition shadow-lg";
                loadAllPartners();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAllLeads();
            } else {
                window.location.href = 'ingresopartner.html';
            }
        });
    </script>

        </div>

    <div id="msg-box-admin">Aviso del Sistema</div>

        <main class="max-w-7xl mx-auto">
            <!-- VISTA DE NEGOCIOS -->
            <div id="view-negocios">
                <!-- GRID DE STATS (1 col en móvil, 3 en desktop) -->

                            <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] border-b border-white/5">
                                <tr>
                                    <th class="px-8 py-6">Propiedad / Cliente</th>

                                    <th class="px-8 py-6 text-center">Firma</th>
                                    <th class="px-8 py-6 text-center">Visitas</th>
                                    <th class="px-8 py-6 text-right">Estatus</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body" class="divide-y divide-white/5 text-sm italic"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Contenedor para tarjetas en móvil -->
                <div id="admin-cards-container" class="md:hidden"></div>
            </div>

            <!-- VISTA DE PARTNERS -->
            <div id="view-partners">
                <!-- GRID DE STATS (1 col en móvil, 3 en desktop) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 text-center">
                    <div class="glass-panel p-6 md:p-8 rounded-[2rem] border-white/5">
                        <div class="text-[9px] md:text-[10px] font-bold text-gray-500 uppercase mb-1 tracking-widest">Partners Totales</div>
                        <div id="stat-partners-total" class="text-4xl md:text-5xl font-black text-white">0</div>
                    </div>
                    <div class="glass-panel p-6 md:p-8 rounded-[2rem] border-purple-500/20 shadow-[0_0_30px_rgba(168,85,247,0.1)]">
                        <div class="text-[9px] md:text-[10px] font-bold text-purple-400 uppercase mb-1 tracking-widest">Nuevos (30 días)</div>
                        <div id="stat-partners-nuevos" class="text-4xl md:text-5xl font-black text-purple-400">0</div>
                    </div>
                    <div class="glass-panel p-6 md:p-8 rounded-[2rem] border-pink-500/20 shadow-[0_0_30px_rgba(236,72,153,0.1)]">
                        <div class="text-[9px] md:text-[10px] font-bold text-pink-500 uppercase mb-1 tracking-widest">Sponsors Únicos</div>
                        <div id="stat-partners-sponsors" class="text-4xl md:text-5xl font-black text-pink-500">0</div>
                    </div>
                </div>

                <!-- TABLE DESKTOP / CARDS MOBILE -->
                <div class="hidden md:block glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] border-b border-white/5">
                                <tr>
                                    <th class="px-8 py-6">Partner</th>
                                    <th class="px-8 py-6 text-center">Sponsor</th>
                                    <th class="px-8 py-6 text-center">Registro</th>
                                    <th class="px-8 py-6 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="admin-partners-body" class="divide-y divide-white/5 text-sm"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Contenedor para tarjetas en móvil -->
                <div id="admin-partners-cards" class="md:hidden"></div>
            </div>
        </main>
    </div>
</body>
</html>
