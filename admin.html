<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collectionGroup, query, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. PEGA AQUÍ TU OBJETO FIREBASECONFIG ---
        const firebaseConfig = {
  apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
  authDomain: "jimenez-asociados-portal.firebaseapp.com",
  projectId: "jimenez-asociados-portal",
  storageBucket: "jimenez-asociados-portal.firebasestorage.app",
  messagingSenderId: "588021927873",
  appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fbAdmin = { auth, db, doc, updateDoc, collectionGroup, query, onSnapshot, getDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .admin-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Panel <span class="text-blue-500">Master</span></h1>
            <p class="text-gray-400 text-sm">Gestión de Leads y Validación de Partners</p>
        </div>
        <div class="text-right">
            <span id="admin-user" class="text-xs font-bold text-gray-500">Verificando sesión...</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="admin-card p-6 rounded-3xl text-center">
                <div class="text-gray-500 text-[10px] font-bold uppercase mb-2">Total Referidos</div>
                <div id="stat-total" class="text-4xl font-black text-white">0</div>
            </div>
            <div class="admin-card p-6 rounded-3xl text-center border-yellow-500/30">
                <div class="text-gray-500 text-[10px] font-bold uppercase mb-2">Pendientes de Firma</div>
                <div id="stat-pending" class="text-4xl font-black text-yellow-500">0</div>
            </div>
            <div class="admin-card p-6 rounded-3xl text-center border-green-500/30">
                <div class="text-gray-500 text-[10px] font-bold uppercase mb-2">Pagos Completados</div>
                <div id="stat-done" class="text-4xl font-black text-green-500">0</div>
            </div>
        </div>

        <div class="admin-card rounded-[2.5rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-400">
                        <tr>
                            <th class="px-8 py-6">Cliente / Servicio</th>
                            <th class="px-8 py-6 text-center">Contactado</th>
                            <th class="px-8 py-6 text-center">Contrato</th>
                            <th class="px-8 py-6 text-center">Visitas</th>
                            <th class="px-8 py-6 text-center">Ofertas</th>
                            <th class="px-8 py-6 text-right">Control de Estado</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-white/5">
                        <tr><td colspan="6" class="px-8 py-20 text-center italic text-gray-600">Cargando base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 1. Seguridad de Admin (Solo tú entras)
        onAuthStateChanged(window.fbAdmin.auth, (user) => {
            if (!user) {
                window.location.href = 'ingresopartner.html';
            } else {
                document.getElementById('admin-user').innerText = "ADMIN: " + user.email;
                loadAllLeads();
            }
        });

        // 2. Cargar TODOS los referidos de TODOS los usuarios
        async function loadAllLeads() {
            // Usamos collectionGroup para buscar "referidos" en cualquier parte de la base de datos
            const q = window.fbAdmin.query(window.fbAdmin.collectionGroup(window.fbAdmin.db, 'referidos'));
            
            window.fbAdmin.onSnapshot(q, (snapshot) => {
                const container = document.getElementById('admin-table-body');
                let html = "";
                let total = 0, pending = 0, done = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const path = docSnap.ref.path; // Guardamos la ruta para poder actualizarlo
                    total++;
                    
                    if(!data.contrato) pending++;
                    if(data.statusFinal === 'Pago Completado') done++;

                    html += `
                        <tr class="hover:bg-white/5 transition">
                            <td class="px-8 py-6">
                                <div class="font-bold text-white">${data.name}</div>
                                <div class="text-[10px] text-blue-400 font-bold uppercase">${data.service}</div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="updateStatus('${path}', 'contactado', ${!data.contactado})" class="btn-action">
                                    <i class="fa-solid ${data.contactado ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-gray-700'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="updateStatus('${path}', 'contrato', ${!data.contrato})" class="btn-action">
                                    <i class="fa-solid ${data.contrato ? 'fa-file-signature text-blue-500' : 'fa-file text-gray-800'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <div class="flex items-center justify-center gap-3">
                                    <button onclick="changeCounter('${path}', 'visitas', -1)" class="text-gray-500">-</button>
                                    <span class="font-bold">${data.visitas || 0}</span>
                                    <button onclick="changeCounter('${path}', 'visitas', 1)" class="text-gray-500">+</button>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <div class="flex items-center justify-center gap-3">
                                    <button onclick="changeCounter('${path}', 'ofertas', -1)" class="text-gray-500">-</button>
                                    <span class="font-bold">${data.ofertas || 0}</span>
                                    <button onclick="changeCounter('${path}', 'ofertas', 1)" class="text-gray-500">+</button>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <select onchange="updateStatus('${path}', 'statusFinal', this.value)" class="bg-black/50 border border-white/10 text-[10px] p-2 rounded-lg font-bold">
                                    <option value="Validando Dato" ${data.statusFinal === 'Validando Dato' ? 'selected' : ''}>VALIDANDO</option>
                                    <option value="En Proceso" ${data.statusFinal === 'En Proceso' ? 'selected' : ''}>EN PROCESO</option>
                                    <option value="En Inscripción" ${data.statusFinal === 'En Inscripción' ? 'selected' : ''}>INSCRIPCIÓN</option>
                                    <option value="Pago Completado" ${data.statusFinal === 'Pago Completado' ? 'selected' : ''}>PAGO LISTO</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });
                
                container.innerHTML = html || '<tr><td colspan="6" class="p-10 text-center">No hay datos en el sistema.</td></tr>';
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-pending').innerText = pending;
                document.getElementById('stat-done').innerText = done;
            });
        }

        // 3. Funciones Globales para los botones
        window.updateStatus = async (path, field, value) => {
            const docRef = window.fbAdmin.doc(window.fbAdmin.db, path);
            await window.fbAdmin.updateDoc(docRef, { [field]: value });
        };

        window.changeCounter = async (path, field, change) => {
            const docRef = window.fbAdmin.doc(window.fbAdmin.db, path);
            const docSnap = await window.fbAdmin.getDoc(docRef);
            const currentVal = docSnap.data()[field] || 0;
            await window.fbAdmin.updateDoc(docRef, { [field]: Math.max(0, currentVal + change) });
        };

    </script>
</body>
</html>
