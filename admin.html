<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Master | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collectionGroup, query, onSnapshot, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
            authDomain: "jimenez-asociados-portal.firebaseapp.com",
            projectId: "jimenez-asociados-portal",
            storageBucket: "jimenez-asociados-portal.firebasestorage.app",
            messagingSenderId: "588021927873",
            appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = 'jimenez-portal-oficial';
        const ADMIN_EMAIL = "sebjmz@gmail.com"; 

        // ==========================================
        // MOTOR DE LIMPIEZA AUTOMÁTICA
        // ==========================================
        async function ejecutarLimpiezaMaestra(snapshot) {
            let borrados = 0;
            const hoy = new Date();
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const path = docSnap.ref.path;
                if (!path.includes(appId)) continue;
                const fechaCreacion = data.createdAt ? data.createdAt.toDate() : hoy;
                const dias = Math.floor((hoy - fechaCreacion) / (1000 * 60 * 60 * 24));
                let debeBorrarse = false;
                if (!data.contactado && dias >= 7) debeBorrarse = true;
                else if (data.contactado && !data.contrato && dias >= 30) debeBorrarse = true;
                else if (data.contrato && !data.visitas && dias >= 60) debeBorrarse = true;
                else if (data.statusFinal !== 'Oferta' && data.statusFinal !== 'Pagado' && dias >= 90) debeBorrarse = true;
                if (debeBorrarse) {
                    await deleteDoc(docSnap.ref);
                    borrados++;
                }
            }
            if (borrados > 0) {
                const box = document.getElementById('msg-box-admin');
                box.innerText = `LIMPIEZA AUTOMÁTICA: Se eliminaron ${borrados} registros vencidos.`;
                box.style.display = 'block';
                setTimeout(() => box.style.display = 'none', 6000);
            }
        }

        // --- CARGA DE NEGOCIOS ---
        function loadAllLeads() {
            const container = document.getElementById('admin-table-body');
            const q = query(collectionGroup(db, 'referidos'));
            onSnapshot(q, (snapshot) => {
                ejecutarLimpiezaMaestra(snapshot);
                let html = "";
                let total = 0, pending = 0, done = 0;
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const path = docSnap.ref.path;
                    if (!path.includes(appId)) return;
                    total++;
                    if (!data.contactado) pending++;
                    if (data.statusFinal === 'Pagado') done++;
                    const dias = data.createdAt ? Math.floor((new Date() - data.createdAt.toDate()) / (1000 * 60 * 60 * 24)) : 0;
                    html += `
                        <tr class="hover:bg-white/5 transition border-b border-white/5">
                            <td class="px-8 py-6">
                                <div class="font-bold text-white text-base">${data.name || 'Sin Nombre'}</div>
                                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${data.service} • Hace ${dias} días</div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'contactado', ${!data.contactado})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.contactado ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-gray-800'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'contrato', ${!data.contrato})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.contrato ? 'fa-file-signature text-blue-500' : 'fa-file text-gray-900'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <button onclick="window.updateStatus('${path}', 'visitas', ${!data.visitas})" class="hover:scale-125 transition">
                                    <i class="fa-solid ${data.visitas ? 'fa-users text-purple-500' : 'fa-users text-gray-800'} text-2xl"></i>
                                </button>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <select onchange="window.updateStatus('${path}', 'statusFinal', this.value)" class="bg-[#0f172a] border border-white/10 text-[10px] p-2.5 rounded-xl font-black text-white uppercase cursor-pointer">
                                    <option value="Validando" ${data.statusFinal === 'Validando' ? 'selected' : ''}>VALIDANDO</option>
                                    <option value="Oferta" ${data.statusFinal === 'Oferta' ? 'selected' : ''}>OFERTA</option>
                                    <option value="Pagado" ${data.statusFinal === 'Pagado' ? 'selected' : ''}>PAGADO</option>
                                    <option value="Perdido" ${data.statusFinal === 'Perdido' ? 'selected' : ''}>PERDIDO</option>
                                </select>
                            </td>
                        </tr>`;
                });
                container.innerHTML = html || '<tr><td colspan="5" class="p-20 text-center text-gray-600 italic">No hay datos activos.</td></tr>';
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-pending').innerText = pending;
                document.getElementById('stat-done').innerText = done;
            });
        }

        // --- CARGA DE PARTNERS (CON SUS 3 RECUADROS RESTAURADOS) ---
        function loadAllPartners() {
            const container = document.getElementById('admin-partners-body');
            const q = query(collectionGroup(db, 'profile'));
            onSnapshot(q, (snapshot) => {
                let html = "";
                let count = 0, nuevos = 0;
                let sponsors = new Set();
                const hoy = new Date();

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const path = docSnap.ref.path;
                    if (!path.includes(appId)) return;
                    
                    count++;
                    if (data.sponsorEmail) sponsors.add(data.sponsorEmail);
                    
                    const fechaCreacion = data.createdAt ? data.createdAt.toDate() : hoy;
                    const dias = Math.floor((hoy - fechaCreacion) / (1000 * 60 * 60 * 24));
                    if (dias <= 30) nuevos++;

                    let fechaStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "---";
                    html += `
                        <tr class="hover:bg-white/5 transition border-b border-white/5">
                            <td class="px-8 py-6">
                                <div class="font-bold text-white text-base">${data.name || 'Socio'}</div>
                                <div class="text-[10px] text-gray-500 font-bold">${data.email}</div>
                            </td>
                            <td class="px-8 py-6 text-center text-xs text-purple-400 font-bold">${data.sponsorEmail || 'Admin'}</td>
                            <td class="px-8 py-6 text-center text-xs text-gray-400 font-bold">${fechaStr}</td>
                            <td class="px-8 py-6 text-right">
                                <button onclick="window.deletePartner('${path}')" class="bg-red-900/10 text-red-500 px-4 py-2 rounded-lg text-[10px] font-black uppercase border border-red-500/10 hover:bg-red-600 hover:text-white transition">Eliminar</button>
                            </td>
                        </tr>`;
                });
                container.innerHTML = html;
                document.getElementById('stat-partners-total').innerText = count;
                document.getElementById('stat-partners-nuevos').innerText = nuevos;
                document.getElementById('stat-partners-sponsors').innerText = sponsors.size;
            });
        }

        window.updateStatus = async (path, field, value) => {
            try { await updateDoc(doc(db, path), { [field]: value }); } catch (e) { alert("Error: " + e.message); }
        };

        window.deletePartner = async (path) => {
            if (confirm("¿Eliminar socio?")) {
                try { 
                    await deleteDoc(doc(db, path)); 
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'estadisticas'), { totalSocios: increment(-1) });
                } catch (e) { alert("Error: " + e.message); }
            }
        };

        window.switchTab = (tab) => {
            document.getElementById('view-negocios').classList.toggle('hidden', tab !== 'negocios');
            document.getElementById('view-partners').classList.toggle('hidden', tab !== 'partners');
            
            const btnNeg = document.getElementById('btn-tab-negocios');
            const btnPart = document.getElementById('btn-tab-partners');
            
            if (tab === 'negocios') {
                btnNeg.className = "bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition shadow-lg";
                btnPart.className = "text-gray-400 hover:text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition";
            } else {
                btnNeg.className = "text-gray-400 hover:text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition";
                btnPart.className = "bg-purple-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition shadow-lg";
                loadAllPartners();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAllLeads();
            } else {
                window.location.href = 'ingresopartner.html';
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        #msg-box-admin { position: fixed; top: 100px; right: 20px; z-index: 100; background: #3b82f6; color: white; padding: 15px; border-radius: 12px; display: none; font-size: 11px; font-weight: bold; border-left: 4px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/10 via-black to-black">

    <div id="loading-screen" class="fixed inset-0 z-50 bg-black flex items-center justify-center text-center">
        <div>
            <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-xs font-black uppercase tracking-[0.3em] text-blue-500 italic">Verificando Seguridad Master...</p>
        </div>
    </div>

    <div id="msg-box-admin">Aviso del Sistema</div>

    <div id="admin-content" class="hidden">
        <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">Panel <span class="text-blue-500">Master</span></h1>
                <p id="admin-id-display" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1 italic">Gestión de Jiménez & Asociados</p>
            </div>
            
            <div class="flex gap-2 bg-white/5 p-1 rounded-xl mx-auto md:mx-0">
                <button id="btn-tab-negocios" onclick="switchTab('negocios')" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition shadow-lg">Negocios</button>
                <button id="btn-tab-partners" onclick="switchTab('partners')" class="text-gray-400 hover:text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition">Partners</button>
            </div>

            <button onclick="signOut(auth).then(() => window.location.href='ingresopartner.html')" class="text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-500/20 px-6 py-3 rounded-xl hover:bg-red-600 hover:text-white transition shadow-sm">Cerrar Sesión</button>
        </header>

        <main class="max-w-7xl mx-auto">
            <!-- VISTA DE NEGOCIOS -->
            <div id="view-negocios">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                    <div class="glass-panel p-8 rounded-[2rem] border-white/5">
                        <div class="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-widest">Referidos Totales</div>
                        <div id="stat-total" class="text-5xl font-black">0</div>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem] border-blue-500/20">
                        <div class="text-[10px] font-bold text-blue-500 uppercase mb-2 tracking-widest">Por Contactar</div>
                        <div id="stat-pending" class="text-5xl font-black text-blue-500">0</div>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem] border-green-500/20">
                        <div class="text-[10px] font-bold text-green-500 uppercase mb-2 tracking-widest">Ventas Pagadas</div>
                        <div id="stat-done" class="text-5xl font-black text-green-500">0</div>
                    </div>
                </div>

                <div class="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] border-b border-white/5">
                                <tr>
                                    <th class="px-8 py-6">Propiedad / Cliente</th>
                                    <th class="px-8 py-6 text-center">Contacto</th>
                                    <th class="px-8 py-6 text-center">Firma</th>
                                    <th class="px-8 py-6 text-center">Visitas</th>
                                    <th class="px-8 py-6 text-right">Estatus</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body" class="divide-y divide-white/5 text-sm italic"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- VISTA DE PARTNERS (RESTAURADA) -->
            <div id="view-partners" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                    <div class="glass-panel p-8 rounded-[2rem] border-white/5 shadow-[0_0_20px_rgba(255,255,255,0.02)]">
                        <div class="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-widest">Partners Totales</div>
                        <div id="stat-partners-total" class="text-5xl font-black text-white">0</div>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem] border-purple-500/20 shadow-[0_0_30px_rgba(168,85,247,0.1)]">
                        <div class="text-[10px] font-bold text-purple-400 uppercase mb-2 tracking-widest">Nuevos (30 días)</div>
                        <div id="stat-partners-nuevos" class="text-5xl font-black text-purple-400">0</div>
                    </div>
                    <div class="glass-panel p-8 rounded-[2rem] border-pink-500/20 shadow-[0_0_30px_rgba(236,72,153,0.1)]">
                        <div class="text-[10px] font-bold text-pink-500 uppercase mb-2 tracking-widest">Sponsors Únicos</div>
                        <div id="stat-partners-sponsors" class="text-5xl font-black text-pink-500">0</div>
                    </div>
                </div>

                <div class="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] border-b border-white/5">
                                <tr>
                                    <th class="px-8 py-6">Partner</th>
                                    <th class="px-8 py-6 text-center">Sponsor</th>
                                    <th class="px-8 py-6 text-center">Registro</th>
                                    <th class="px-8 py-6 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="admin-partners-body" class="divide-y divide-white/5 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
