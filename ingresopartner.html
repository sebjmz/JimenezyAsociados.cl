<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Partners | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        // 1. IMPORTAMOS TODO LO NECESARIO EN UN SOLO BLOQUE (Añadimos signOut)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyArXy47I3PF38TZG5K8GHNT_NHOJL_UbhY",
            authDomain: "jimenez-asociados-portal.firebaseapp.com",
            projectId: "jimenez-asociados-portal",
            storageBucket: "jimenez-asociados-portal.firebasestorage.app",
            messagingSenderId: "588021927873",
            appId: "1:588021927873:web:bb0b494c51e6d0a4e76940"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const ADMIN_EMAIL = "sebjmz@gmail.com"; 

        // --- FUNCIÓN PARA RECUPERAR CLAVE ---
        async function recuperarClave() {
            const emailField = document.getElementById('email'); 
            const email = emailField.value;

            if (email === "") {
                alert("Por favor, escribe tu correo en el cuadro para poder enviarte el link.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("¡Listo! Enviamos un link de recuperación a tu correo. Revisa también tu carpeta de Spam.");
            } catch (error) {
                console.error("Error:", error);
                alert("No pudimos enviar el correo. Revisa si está bien escrito.");
            }
        }

        // --- LÓGICA DE INICIO DE SESIÓN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn-entrar');

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // ==========================================
                // ESCUDO DE VERIFICACIÓN DE CORREO
                // ==========================================
                // Si el usuario NO ha verificado su correo y NO es el administrador
                if (!user.emailVerified && user.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                    await signOut(auth); // Lo cerramos inmediatamente por seguridad
                    alert("⚠️ ACCESO DENEGADO: Aún no has verificado tu cuenta.\n\nPor favor, revisa tu correo electrónico (y tu carpeta de Spam), abre el correo de Jiménez & Asociados y haz clic en el enlace para activar tu acceso.");
                    btn.innerText = "ENTRAR AL PORTAL";
                    btn.disabled = false;
                    return; // Cortamos el código aquí para que no pase a la Intranet
                }

                // Si pasa el escudo, lo mandamos a su panel
                if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    window.location.href = 'admin.html';
                } else {
                    localStorage.setItem('active_partner', email.split('@')[0]);
                    window.location.href = 'intranet.html';
                }
            } catch (error) {
                alert("Error: Correo o contraseña incorrectos.");
                btn.innerText = "ENTRAR AL PORTAL";
                btn.disabled = false;
            }
        });

        // Hacemos que la función sea visible para el botón de HTML
        window.recuperarClave = recuperarClave;
        
        // >>> PEGA AQUÍ EL PASO 3 (Capturador) <<<
window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const sponsorReferido = params.get('ref');
    if (sponsorReferido) {
        const inputSponsor = document.querySelector('input[placeholder*="invitó"]') || 
                             document.querySelector('input[name*="sponsor"]');
        if (inputSponsor) {
            inputSponsor.value = decodeURIComponent(sponsorReferido).toLowerCase();
            inputSponsor.style.border = "2px solid #db2777"; 
            inputSponsor.readOnly = true;
        }
    }
});
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black">
    
    <div class="mb-12 text-center">
        <div class="text-3xl font-black tracking-tighter mb-2 cursor-pointer" onclick="window.location.href='index.html'">
            JIMÉNEZ<span class="text-blue-500">&</span>ASOCIADOS
        </div>
        <p class="text-gray-500 uppercase tracking-widest text-[10px] font-bold italic">Portal de Acceso</p>
    </div>

    <div class="glass-panel w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl">
        <h1 class="text-3xl font-black mb-8 text-center uppercase italic text-white">Ingreso <span class="text-blue-500">Socio</span></h1>
        
        <form id="login-form" class="space-y-4">
            <input type="email" id="email" required placeholder="Tu correo" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white transition">
            <input type="password" id="pass" required placeholder="Tu contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-white transition">
            <button type="submit" id="btn-entrar" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-lg transition shadow-xl shadow-blue-900/40 uppercase">
                ENTRAR AL PORTAL
            </button>

            <div style="margin-top: 20px; text-align: center;">
                <a href="#" onclick="recuperarClave()" style="color: #3b82f6; text-decoration: none; font-size: 0.9rem; font-weight: 600;">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500">¿No tienes cuenta? <a href="registrate.html" class="text-blue-500 font-bold underline hover:text-blue-400 transition">Regístrate aquí</a></p>
        </div>
    </div>
</body>
</html>
