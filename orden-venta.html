<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Venta Exclusiva | Jiménez & Asociados</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --bg: #f4f7f6; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: white; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        h3 { font-size: 1.1rem; color: var(--accent); margin-top: 25px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input[type="text"], input[type="number"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .file-input { background: #fafafa; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; cursor: pointer; }
        .preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 4px; display: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 30px; }
        #status { text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ORDEN DE VENTA EXCLUSIVA</h2>
    <form id="uploadForm">
        <h3>Datos del Mandante</h3>
        <div class="form-group"><label>Tipo de Contrato</label><select id="tipo_orden" required><option value="EXCLUSIVA">Venta Exclusiva</option><option value="NO EXCLUSIVA">Venta NO Exclusiva</option></select></div>
        <div class="form-group"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
        <div class="form-group"><label>RUT</label><input type="text" id="rut" required></div>
        <div class="form-group"><label>Email para envío de copia</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Domicilio Particular</label><input type="text" id="domicilio" required></div>
        <div class="form-group"><label>Ciudad</label><input type="text" id="ciudad" placeholder="Ej: Viña del Mar, Concón, Valparaíso" required></div>

        <h3>Información de la Propiedad</h3>
        <div class="form-group"><label>Dirección Completa (Calle, Número, Comuna)</label><input type="text" id="direccion" required></div>
        <div class="form-group"><label>Departamento (Opcional)</label><input type="text" id="depto" placeholder="Ej: 211"></div>
        <div class="form-group"><label>Estacionamientos (Opcional)</label><input type="text" id="estacionamientos" placeholder="Ej: E-3"></div>
        <div class="form-group"><label>Bodegas (Opcional)</label><input type="text" id="bodegas" placeholder="Ej: B-77"></div>
        <div class="form-group"><label>Rol de Avalúo</label><input type="text" id="rol" placeholder="Ej: 1234-56"></div>
        <div class="form-group"><label>Precio de Venta (UF)</label><input type="number" id="precio" required></div>

        <h3>Firmas y Documentación</h3>
        <div class="form-group">
            <label>Foto Cédula de Identidad</label>
            <div class="file-input" onclick="document.getElementById('file_carnet').click()">📸 Tocar para foto del Carnet
                <input type="file" id="file_carnet" accept="image/*" capture="camera" style="display:none">
            </div>
            <img id="prev_carnet" class="preview">
        </div>
        <div class="form-group">
            <label>Firma del Mandante</label>
            <div class="file-input" onclick="document.getElementById('file_firma').click()">✍️ Tocar para foto de la Firma
                <input type="file" id="file_firma" accept="image/*" capture="camera" style="display:none">
            </div>
            <img id="prev_firma" class="preview">
        </div>

        <button type="submit" id="submitBtn">GENERAR Y FIRMAR CONTRATO</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const fileInputs = ['file_carnet', 'file_firma'];
    const previews = { 'file_carnet': 'prev_carnet', 'file_firma': 'prev_firma' };
    const base64Files = {};

    fileInputs.forEach(id => {
        document.getElementById(id).addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; const MAX_HEIGHT = 600;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // Comprime la foto
                    document.getElementById(previews[id]).src = dataUrl;
                    document.getElementById(previews[id]).style.display = 'block';
                    base64Files[id] = dataUrl.split(',')[1];
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    });

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        btn.disabled = true; btn.innerText = "Procesando...";

        const formData = {
    tipo_orden: document.getElementById('tipo_orden').value,
    nombre: document.getElementById('nombre').value,
    rut: document.getElementById('rut').value,
    email: document.getElementById('email').value,
    domicilio_mandante: document.getElementById('domicilio').value,
    direccion: document.getElementById('direccion').value,
    ciudad: document.getElementById('ciudad').value, // <-- AGREGA ESTA LÍNEA
    depto: document.getElementById('depto').value || "S/N",
    estacionamientos: document.getElementById('estacionamientos').value || "No",
    bodegas: document.getElementById('bodegas').value || "No",
    rol: document.getElementById('rol').value || "En trámite",
    precio: document.getElementById('precio').value,
    foto_carnet: base64Files['file_carnet'],
    foto_firma: base64Files['file_firma'],
    url_firma_sebas: "https://raw.githubusercontent.com/sebjmz/JimenezyAsociados.cl/main/img/firma.png",
    url_carnet_sebas: "https://raw.githubusercontent.com/sebjmz/JimenezyAsociados.cl/main/img/20260415_133801.jpg"
};

        try {
            // DEBES PONER LA NUEVA URL QUE GOOGLE TE DÉ EN EL PASO 3 AQUÍ
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5mg0f2NbNwWCS72E5Xbkq7vHOnt2keMlZ4UTwwNw29KjYHpepDP1zy5feRfRqNatV/exec"; 
            
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(formData)
            });

            status.style.color = "green";
            status.innerText = "✅ ¡Contrato generado! Revisa tu correo en breve.";
            btn.innerText = "ENVIADO";
        } catch (error) {
            status.style.color = "red";
            status.innerText = "❌ Error en la red.";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
