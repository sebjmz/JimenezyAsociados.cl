<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Venta Exclusiva | Jiménez & Asociados</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #b21f1f;
            --bg: #f4f7f6;
        }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: white; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        h3 { font-size: 1.1rem; color: var(--accent); margin-top: 25px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input[type="text"], input[type="number"], input[type="email"], select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        .file-input { background: #fafafa; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; cursor: pointer; }
        .file-input:hover { border-color: var(--primary); }
        .preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 4px; display: none; }
        button { 
            width: 100%; background: var(--primary); color: white; border: none; padding: 15px; 
            font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 30px;
            transition: background 0.3s;
        }
        button:hover { background: #0d1a4a; }
        #status { text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ORDEN DE VENTA EXCLUSIVA</h2>
    <p style="text-align: center; font-size: 0.9rem;">Jiménez & Asociados - Gestión Inmobiliaria</p>

    <form id="uploadForm">
        <h3>Datos del Mandante</h3>
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" id="nombre" placeholder="Ej: Sumeet Sangar" required>
        </div>
        <div class="form-group">
            <label>RUT</label>
            <input type="text" name="rut" id="rut" placeholder="12.345.678-9" required>
        </div>
        <div class="form-group">
            <label>Email para envío de copia</label>
            <input type="email" name="email" id="email" required>
        </div>

        <h3>Información de la Propiedad</h3>
        <div class="form-group">
            <label>Dirección Completa</label>
            <input type="text" name="direccion" id="direccion" placeholder="Calle, Número, Depto, Comuna" required>
        </div>
        <div class="form-group">
            <label>Precio de Venta (UF)</label>
            <input type="number" name="precio" id="precio" placeholder="10000" required>
        </div>
        <div class="form-group">
            <label>Estacionamiento / Bodega</label>
            <input type="text" name="anexos" id="anexos" placeholder="E-3, E-105, B-77">
        </div>

        <h3>Firmas y Documentación</h3>
        
        <div class="form-group">
            <label>Foto Cédula de Identidad (Mandante)</label>
            <div class="file-input" onclick="document.getElementById('file_carnet').click()">
                📸 Tocar para tomar foto del Carnet
                <input type="file" id="file_carnet" accept="image/*" capture="camera" style="display:none">
            </div>
            <img id="prev_carnet" class="preview">
        </div>

        <div class="form-group">
            <label>Firma del Mandante (Firmar en papel y fotografiar)</label>
            <div class="file-input" onclick="document.getElementById('file_firma').click()">
                ✍️ Tocar para tomar foto de la Firma
                <input type="file" id="file_firma" accept="image/*" capture="camera" style="display:none">
            </div>
            <img id="prev_firma" class="preview">
        </div>

        <button type="submit" id="submitBtn">GENERAR Y FIRMAR CONTRATO</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const fileInputs = ['file_carnet', 'file_firma'];
    const previews = { 'file_carnet': 'prev_carnet', 'file_firma': 'prev_firma' };
    const base64Files = {};

    // Previsualización y conversión a Base64
    fileInputs.forEach(id => {
        document.getElementById(id).addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById(previews[id]).src = event.target.result;
                document.getElementById(previews[id]).style.display = 'block';
                base64Files[id] = event.target.result.split(',')[1]; // Solo el contenido base64
            };
            reader.readAsDataURL(file);
        });
    });

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Procesando...";
        status.innerText = "Generando PDF y enviando copias...";

        const formData = {
            nombre: document.getElementById('nombre').value,
            rut: document.getElementById('rut').value,
            email: document.getElementById('email').value,
            direccion: document.getElementById('direccion').value,
            precio: document.getElementById('precio').value,
            anexos: document.getElementById('anexos').value,
            foto_carnet: base64Files['file_carnet'],
            foto_firma: base64Files['file_firma'],
            // Tu firma y carnet ya están en el servidor o se sacan de GitHub por URL
            firma_corredor_url: "https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/img/firma-sebastián.png"
        };

        try {
            // AQUÍ CONECTARÁS CON LA URL DE TU GOOGLE APPS SCRIPT
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCinE8rGqdA9T0z4e5jLD7tW7dyLsBtkiqaZDb_Eq6yQOIoV59wzBsYi_aBO1hw68G/exec";
            
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para Google Scripts
                body: JSON.stringify(formData)
            });

            status.style.color = "green";
            status.innerText = "✅ ¡Contrato generado exitosamente! Las copias han sido enviadas a los correos electrónicos.";
            btn.innerText = "ENVIADO";
        } catch (error) {
            console.error(error);
            status.style.color = "red";
            status.innerText = "❌ Error al procesar. Revisa tu conexión.";
            btn.disabled = false;
            btn.innerText = "REINTENTAR";
        }
    };
</script>

</body>
</html>
