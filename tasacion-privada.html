<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Tu Evaluación Privada | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #030303; 
            color: #ffffff; 
            overflow-x: hidden;
        }

        /* Estilos Premium para Formularios */
        .premium-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .premium-input:focus {
            border-bottom: 1px solid #3b82f6;
        }

        .premium-input option {
            background: #0a0a0a;
            color: #fff;
        }

        .label-premium {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-top: 24px;
            margin-bottom: 4px;
        }

        /* Animaciones iniciales ocultas */
        .reveal-item { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-5xl grid md:grid-cols-2 gap-12 items-center">
        
        <div class="reveal-item p-6 md:p-10 rounded-2xl bg-white/[0.02] border border-white/5 backdrop-blur-sm">
            <div class="mb-10">
                <h1 class="text-3xl font-light tracking-tight mb-2">Configuración <span class="font-bold text-blue-500">Paramétrica</span></h1>
                <p class="text-sm text-gray-500">Ajuste los valores para obtener una estimación en tiempo real.</p>
            </div>

            <label class="label-premium">Zona Geográfica</label>
            <select id="macroZona" class="premium-input">
                <option value="">Seleccione sector principal...</option>
                <option value="vina">Viña del Mar</option>
                <option value="concon">Concón</option>
                <option value="valpo">Valparaíso</option>
                <option value="litoral">Litoral Norte</option>
            </select>

            <label class="label-premium">Micro-Zona (UF/m²)</label>
            <select id="microZona" class="premium-input" disabled>
                <option value="">Esperando selección previa...</option>
            </select>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="label-premium">Sup. Útil (m²)</label>
                    <input type="number" id="supUtil" class="premium-input text-center" value="0" min="0">
                </div>
                <div>
                    <label class="label-premium">Terraza/Patio (m²)</label>
                    <input type="number" id="supTerraza" class="premium-input text-center" value="0" min="0">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mt-2">
                <div>
                    <label class="label-premium">Vista</label>
                    <select id="vista" class="premium-input text-sm">
                        <option value="1.25">Frontal al Mar</option>
                        <option value="1.10">Parcial Mar</option>
                        <option value="1.00" selected>Ciudad/Verde</option>
                        <option value="0.90">Interior</option>
                    </select>
                </div>
                <div>
                    <label class="label-premium">Orientación</label>
                    <select id="orientacion" class="premium-input text-sm">
                        <option value="1.05">Nororiente</option>
                        <option value="1.03">Norte</option>
                        <option value="1.02">Poniente</option>
                        <option value="1.00" selected>Oriente</option>
                        <option value="0.95">Sur</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mt-2">
                <div>
                    <label class="label-premium">Antigüedad</label>
                    <select id="antiguedad" class="premium-input text-sm">
                        <option value="1.05">0 a 2 años</option>
                        <option value="1.00" selected>3 a 10 años</option>
                        <option value="0.95">11 a 20 años</option>
                        <option value="0.85">+20 años</option>
                    </select>
                </div>
                <div>
                    <label class="label-premium">Estado</label>
                    <select id="estado" class="premium-input text-sm">
                        <option value="1.15">Premium</option>
                        <option value="1.00" selected>Estándar</option>
                        <option value="0.90">Con desgaste</option>
                        <option value="0.70">A remodelar</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="reveal-item flex flex-col justify-center items-center md:items-start text-center md:text-left pl-0 md:pl-10">
            
            <div class="mb-16">
                <div class="text-[10px] uppercase tracking-[4px] text-gray-500 mb-4">Herramienta Privada</div>
                <div class="text-xl font-extrabold tracking-tighter text-white">
                    JIMÉNEZ<span class="text-blue-500">&</span>ASOCIADOS
                </div>
            </div>

            <div class="w-full">
                <h2 class="text-sm uppercase tracking-widest text-gray-500 mb-2">Valor Comercial Sugerido</h2>
                
                <div class="flex items-baseline justify-center md:justify-start gap-3 mb-1">
                    <span id="resultadoNumeroUF" class="text-7xl md:text-8xl font-light text-white tracking-tighter tabular-nums">0</span>
                    <span class="text-2xl text-blue-500 font-bold">UF</span>
                </div>
                
                <div id="resultadoCLP" class="text-gray-500 text-lg font-light tracking-wide opacity-0 transition-opacity duration-500">
                    $0 CLP
                </div>
            </div>

            <div class="mt-16 w-full max-w-sm">
                <button onclick="contactarAsesor()" class="w-full py-4 bg-white hover:bg-gray-200 text-black font-bold text-sm uppercase tracking-widest rounded-full transition-all duration-300 transform hover:-translate-y-1 shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                    Agendar Visita Técnica
                </button>
                <p class="text-[10px] text-gray-600 text-center mt-4 uppercase tracking-widest">Servicio de guante blanco</p>
            </div>

        </div>
    </div>

    <script>
        // 1. ANIMACIÓN DE ENTRADA (Lujo silencioso)
        window.onload = () => {
            gsap.to(".reveal-item", {
                y: 0,
                opacity: 1,
                duration: 1.2,
                stagger: 0.2,
                ease: "power3.out"
            });
        };

        // 2. DATOS DE MERCADO
        const datosZonas = {
            vina: { "Reñaca Norte": 85, "Reñaca Centro/Bajo": 75, "Jardín del Mar": 68, "Población Vergara": 80, "Plan de Viña": 65 },
            concon: { "Costa de Montemar": 82, "Bosques de Montemar": 70, "Borde Costero": 78, "Concón Central": 60 },
            valpo: { "Cerro Alegre/Concepción": 65, "Curauma": 55, "Plan Valparaíso": 45 },
            litoral: { "Zapallar": 110, "Cachagua": 105, "Maitencillo/Marbella": 90 }
        };

        const valorUFActual = 37800;
        let valorAnteriorUF = 0; // Para animar desde el valor anterior

        const macroZonaSelect = document.getElementById('macroZona');
        const microZonaSelect = document.getElementById('microZona');
        const inputs = document.querySelectorAll('.premium-input');
        const resultadoUFObj = { val: 0 }; // Objeto para que GSAP pueda animarlo
        const textoNumeroUF = document.getElementById('resultadoNumeroUF');
        const textoCLP = document.getElementById('resultadoCLP');

        // 3. LÓGICA DE MENÚS
        macroZonaSelect.addEventListener('change', function() {
            microZonaSelect.innerHTML = '<option value="">Seleccione Micro-Zona</option>';
            const seleccion = this.value;
            if (seleccion && datosZonas[seleccion]) {
                microZonaSelect.disabled = false;
                for (const [zona, valor] of Object.entries(datosZonas[seleccion])) {
                    const option = document.createElement('option');
                    option.value = valor;
                    option.textContent = zona;
                    microZonaSelect.appendChild(option);
                }
            } else {
                microZonaSelect.disabled = true;
            }
            calcular(); 
        });

        // 4. MOTOR DE CÁLCULO Y ANIMACIÓN
        function calcular() {
            const ufBaseM2 = parseFloat(microZonaSelect.value) || 0;
            const supUtil = parseFloat(document.getElementById('supUtil').value) || 0;
            const supTerraza = parseFloat(document.getElementById('supTerraza').value) || 0;
            const vista = parseFloat(document.getElementById('vista').value) || 1;
            const orientacion = parseFloat(document.getElementById('orientacion').value) || 1;
            const antiguedad = parseFloat(document.getElementById('antiguedad').value) || 1;
            const estado = parseFloat(document.getElementById('estado').value) || 1;

            if (ufBaseM2 === 0 || supUtil === 0) {
                animarNumero(0, 0);
                textoCLP.style.opacity = 0;
                return;
            }

            const valorBase = (supUtil * ufBaseM2) + (supTerraza * (ufBaseM2 * 0.5));
            const totalUF = valorBase * (vista * orientacion * antiguedad * estado);
            const totalCLP = totalUF * valorUFActual;

            animarNumero(totalUF, totalCLP);
        }

        // 5. EFECTO ODÓMETRO PREMIUM CON GSAP
        function animarNumero(nuevoTotalUF, nuevoTotalCLP) {
            gsap.to(resultadoUFObj, {
                val: nuevoTotalUF,
                duration: 1.5,
                ease: "power2.out",
                onUpdate: function() {
                    textoNumeroUF.innerText = Math.round(resultadoUFObj.val).toLocaleString('es-CL');
                },
                onComplete: function() {
                    if(nuevoTotalCLP > 0) {
                        textoCLP.innerText = "$ " + Math.round(nuevoTotalCLP).toLocaleString('es-CL') + " CLP";
                        textoCLP.style.opacity = 1;
                    }
                }
            });
        }

        inputs.forEach(input => {
            input.addEventListener('change', calcular);
            input.addEventListener('keyup', calcular);
        });

        // 6. ACCIÓN DE CONTACTO
        function contactarAsesor() {
            const numeroUF = textoNumeroUF.innerText;
            if(numeroUF === "0") {
                alert("Por favor, ingresa los datos de la propiedad primero.");
                return;
            }
            const mensaje = `Hola Sebastián. Usé el simulador privado y mi propiedad arrojó un valor referencial de ${numeroUF} UF. Quisiera agendar una visita técnica oficial para confirmar el precio de mercado.`;
            window.open(`https://wa.me/56951134778?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>
</body>
</html>
