<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Motor de Tasación Pro | Jiménez & Asociados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #ffffff; }
        .tech-input { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 6px; padding: 10px; width: 100%; color: white; outline: none; font-size: 14px; transition: 0.2s; }
        .tech-input:focus { border-color: #3b82f6; }
        .label-min { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; display: block; }
        .card-glass { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 md:px-8 flex items-center justify-center">

    <div class="max-w-6xl w-full grid lg:grid-cols-12 gap-6 items-stretch">
        
        <div class="lg:col-span-7 card-glass p-8 shadow-2xl">
            <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                <div class="text-lg font-bold tracking-tighter uppercase italic text-blue-500">Analizador Comercial Jiménez & Asociados</div>
                <div class="text-[9px] text-gray-600 tracking-widest uppercase">Expertise Regional</div>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="label-min">Tipología</label>
                    <select id="tipo" class="tech-input" onchange="toggleLabels()">
                        <option value="departamento">Departamento</option>
                        <option value="casa" selected>Casa</option>
                    </select>
                </div>
                <div>
                    <label class="label-min">Comuna / Sector</label>
                    <select id="macro" class="tech-input" onchange="cargarMicroZonas()">
                        <option value="">Seleccione Comuna...</option>
                        <option value="vina">Viña del Mar</option>
                        <option value="concon">Concón</option>
                        <option value="valparaiso">Valparaíso</option>
                        <option value="interior">Quilpué / Villa Alemana</option>
                        <option value="litoral_norte">Puchuncaví / Zapallar</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="label-min">Zona Específica</label>
                    <select id="micro" class="tech-input" disabled onchange="calcular()"></select>
                </div>

                <div>
                    <label class="label-min">M² Construidos (Útiles)</label>
                    <input type="number" id="util" class="tech-input" value="0" oninput="calcular()">
                </div>
                <div>
                    <label id="lblExtra" class="label-min">M² Terreno Total</label>
                    <input type="number" id="extra" class="tech-input" value="0" oninput="calcular()">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="label-min">Dormitorios</label>
                        <input type="number" id="dorms" class="tech-input" value="1" min="1" oninput="calcular()">
                    </div>
                    <div>
                        <label class="label-min">Baños</label>
                        <input type="number" id="banos" class="tech-input" value="1" min="1" oninput="calcular()">
                    </div>
                </div>

                <div>
                    <label class="label-min">Orientación Principal</label>
                    <select id="orienta" class="tech-input" onchange="calcular()">
                        <option value="1.08">Nor-Poniente (Top)</option>
                        <option value="1.05">Poniente / Nor-Este</option>
                        <option value="1.03">Norte</option>
                        <option value="1.00" selected>Oriente</option>
                        <option value="0.90">Sur (Frío/Menos luz)</option>
                    </select>
                </div>
                <div>
                    <label class="label-min">Vista al Mar</label>
                    <select id="vista" class="tech-input" onchange="calcular()">
                        <option value="1.30">Frontal Despejada</option>
                        <option value="1.15">Parcial</option>
                        <option value="1.00" selected>Sin Vista Especial</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="label-min">Estado de Conservación</label>
                    <select id="estado" class="tech-input" onchange="calcular()">
                        <option value="1.10">Remodelado / Nuevo</option>
                        <option value="1.00" selected>Bueno / Habitable</option>
                        <option value="0.75">Requiere Inversión</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="card-glass p-12 text-center flex-grow flex flex-col justify-center">
                <div class="text-[10px] text-gray-600 uppercase tracking-[4px] mb-6">Avalúo Referencial Mercado</div>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="numUF" class="text-8xl font-bold tracking-tighter text-white tabular-nums">0</span>
                    <span class="text-2xl text-blue-500 font-bold">UF</span>
                </div>
                <div id="numCLP" class="text-lg text-gray-500 mt-6 opacity-0 transition-opacity duration-500 font-light">$ 0</div>
            </div>

            <button onclick="enviarWhatsApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-xl shadow-2xl transition-all transform hover:scale-[1.01] uppercase tracking-tighter flex items-center justify-center gap-3">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                Formalizar Tasación Oficial
            </button>
        </div>
    </div>

    <script>
        const VALOR_UF_HOY = 37850; 
        
        // VALORES UF/m2 AJUSTADOS A REALIDAD 2026 GÓMEZ CARREÑO / QUINTA REGIÓN
        const ZONAS = {
            vina: { "Gómez Carreño": 30, "Reñaca Norte": 85, "Reñaca Centro": 75, "Jardín del Mar": 68, "Miraflores Bajo": 62, "Santa Inés": 45 },
            concon: { "Costa Montemar": 82, "Bosques Montemar": 72, "Borde Mar": 78, "Concón Sur": 55 },
            valparaiso: { "Cerro Alegre": 68, "Curauma": 52, "Playa Ancha": 42, "Plan Valparaíso": 48 },
            interior: { "Quilpué (Centro)": 40, "Los Pinos": 44, "Villa Alemana Sur": 38, "Peñablanca": 46 },
            litoral_norte: { "Zapallar": 120, "Cachagua": 110, "Maitencillo": 85, "Papudo": 78 }
        };

        const resObj = { val: 0 };

        function toggleLabels() {
            const tipo = document.getElementById('tipo').value;
            document.getElementById('lblExtra').innerText = tipo === 'casa' ? 'M² Terreno Total' : 'M² Terraza';
            calcular();
        }

        function cargarMicroZonas() {
            const macro = document.getElementById('macro').value;
            const micro = document.getElementById('micro');
            micro.innerHTML = '<option value="">Seleccione Sector...</option>';
            if (macro) {
                micro.disabled = false;
                for (let z in ZONAS[macro]) {
                    let o = document.createElement('option');
                    o.value = ZONAS[macro][z]; o.innerText = z;
                    micro.appendChild(o);
                }
            } else { micro.disabled = true; }
            calcular();
        }

        function calcular() {
            const pBase = parseFloat(document.getElementById('micro').value) || 0;
            const mUtil = parseFloat(document.getElementById('util').value) || 0;
            const mExtra = parseFloat(document.getElementById('extra').value) || 0;
            const tipo = document.getElementById('tipo').value;

            if (!pBase || !mUtil) { updateUI(0); return; }

            // Lógica corregida para Casas (Ponderación de Patio no abusiva)
            let vInmueble = mUtil * pBase;
            let vExtra = 0;

            if (tipo === 'casa') {
                // El terreno en casas de barrio se tasa muy distinto al m2 construido.
                // Se usa una incidencia de entre 3 a 5 UF por m2 de patio libre, no una proporción del útil.
                const mPatioLibre = Math.max(0, mExtra - mUtil);
                vExtra = mPatioLibre * 4.5; // Valor promedio UF m2 terreno en la zona
            } else {
                // Terrazas en departamentos al 50% del valor base
                vExtra = mExtra * (pBase * 0.50);
            }

            // Factores Multiplicadores
            const fVista = parseFloat(document.getElementById('vista').value);
            const fOrienta = parseFloat(document.getElementById('orienta').value);
            const fEstado = parseFloat(document.getElementById('estado').value);
            
            // Factor Habitabilidad sutil
            const nD = parseInt(document.getElementById('dorms').value);
            const nB = parseInt(document.getElementById('banos').value);
            const fHabit = (1 + (nD * 0.01)) * (1 + (nB * 0.005));

            const finalUF = (vInmueble + vExtra) * fVista * fOrienta * fEstado * fHabit;
            updateUI(finalUF);
        }

        function updateUI(uf) {
            gsap.to(resObj, {
                val: uf, duration: 1, ease: "power3.out",
                onUpdate: () => {
                    document.getElementById('numUF').innerText = Math.round(resObj.val).toLocaleString('es-CL');
                },
                onComplete: () => {
                    const clp = document.getElementById('numCLP');
                    if (uf > 0) {
                        clp.innerText = "$ " + Math.round(uf * VALOR_UF_HOY).toLocaleString('es-CL');
                        clp.style.opacity = 1;
                    } else { clp.style.opacity = 0; }
                }
            });
        }

        function enviarWhatsApp() {
            const uf = document.getElementById('numUF').innerText;
            const msg = `Hola Sebastián. Tasación web: ${uf} UF. Necesito validación técnica.`;
            window.open(`https://wa.me/56951134778?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => {
            initMacro();
            gsap.from(".card-glass", { opacity: 0, y: 30, duration: 1, stagger: 0.2 });
        };
        
        function initMacro(){ toggleLabels(); }
    </script>
</body>
</html>
